# ────────────────────────────────────────────────────────────────────
# takeout2paperless — configuration file
# ────────────────────────────────────────────────────────────────────
# Copy this file to ../config.toml (one level up, the project root)
# and customise it.  All settings live here; there are no CLI flags.
# ────────────────────────────────────────────────────────────────────

[takeout2paperless]

# Directory containing your Google Takeout archive files.
# The tool scans this folder for .zip, .tar.*, and .7z files.
input_dir = "."

# Where extracted documents will be written (created if missing).
output_dir = "paperless_ready"

# When true, no files are written.  Useful for testing your rules.
dry_run = false

# When true, the original directory path is encoded into the filename
# so you can distinguish files from different folders.
#
#   e.g. Takeout/Drive/Documents/report.pdf
#        → Takeout_Drive_Documents_report.pdf
#
# instead of just ``report.pdf``.
fingerprint = false


[filter]

# Only files with these extensions are extracted.
# Everything else is silently skipped.
include_extensions = [
    ".pdf",
    ".docx",
    ".doc",
    ".xlsx",
    ".xls",
    ".csv",
    ".txt",
]


[paperless]

# Optional: command to run after extraction when the user confirms.
# {output_dir} is substituted with the absolute output directory path.
# If unset, the program prints a hint instead of running anything.
#
# Example for Docker-based Paperless-ngx:
# consume_cmd = "docker compose -f ~/homelab/paperless-ngx/docker-compose.yml exec webserver python manage.py document_consumer {output_dir}"


[exclude]

# Unified ban list.
# Every entry is compiled as a case-insensitive regex and checked
# against BOTH the filename and the full archive path.
#
# Simple strings like "trash" will match anywhere in the path.
# Regexes like "^\\d{4}_.*\\.pdf$" will match the filename only
# (the ^ anchor prevents accidental full-path matches).
#
# If you omit this key entirely, built-in defaults kick in:
#   ban = ["google photos", "trash"]
ban = [
    # "^\\d{4}_[a-z]\\d{2}_(?:qp|ms|er|gt|ir|sy|sr|ci|sm|in|tn|sp|nt|sf)(?:_\\d{1,3})?\\.pdf$",
]
