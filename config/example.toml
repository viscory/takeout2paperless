# ────────────────────────────────────────────────────────────────────
# takeout2paperless — configuration file
# ────────────────────────────────────────────────────────────────────
# Copy this file to ../config.toml (one level up, the project root)
# and customise it.  All settings live here; there are no CLI flags.
# ────────────────────────────────────────────────────────────────────

# ── Directories ────────────────────────────────────────────────────

# Directory containing your Google Takeout archive files.
# The tool scans this folder for .zip, .tar.*, and .7z files.
input_dir = "."

# Where extracted documents will be written (created if missing).
output_dir = "paperless_ready"


# ── Target file types ──────────────────────────────────────────────

# Only files with these extensions are extracted.
# Everything else is silently skipped.
target_extensions = [
    ".pdf",
    ".docx",
    ".doc",
    ".xlsx",
    ".xls",
    ".csv",
    ".txt",
]


# ── Advanced ───────────────────────────────────────────────────────

# When true, no files are written.  Useful for testing your rules.
dry_run = false

# When true, the original directory path is encoded into the filename
# so you can distinguish files from different folders.
#
#   e.g. Takeout/Drive/Documents/report.pdf
#        → Takeout_Drive_Documents_report.pdf
#
# instead of just ``report.pdf``.
fingerprint = false


# ── Exclusion rules ────────────────────────────────────────────────

[exclude]

  # ── Directory blocklist ──────────────────────────────────────────
  # Set any path fragment to true to skip _every_ file whose
  # archive path contains that string (case-insensitive).
  # Set to false to allow files in that path through.
  [exclude.directories]
  "google photos" = true     # Skip Google Photos folders
  trash = true               # Skip Trash folders

  # ── Filename regex patterns ──────────────────────────────────────
  # Each entry is a named rule whose value is a regex.
  # Any file whose *filename* matches one of these patterns
  # (case-insensitive) is skipped.
  #
  # Use this to block files by naming convention — e.g. exam papers,
  # system files, thumbnails, etc.
  #
  # The example below blocks Cambridge / CIE-style exam PDFs:
  #   {subject}_{session}_{component}_{paper}.pdf
  # e.g. 1123_w15_ms_21.pdf, 9702_s18_qp_12.pdf
  #
  # 🔹  Remove, replace, or add your own patterns as needed.
  [exclude.filename_patterns]
  # "exam-papers" = "^\\d{4}_[a-z]\\d{2}_(?:qp|ms|er|gt|ir|sy|sr|ci|sm|in|tn|sp|nt|sf)(?:_\\d{1,3})?\\.pdf$"
