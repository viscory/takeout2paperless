# ────────────────────────────────────────────────────────────────────
# takeout2paperless — example configuration file
# ────────────────────────────────────────────────────────────────────
# Copy this file to ../config.toml (one level up, the project root)
# and customise it.  All settings live here; there are no CLI flags
# except an optional --config PATH.
# ────────────────────────────────────────────────────────────────────


# ═══════════════════════════════════════════════════════════════════
# [paths] — where to read archives and where to write documents
# ═══════════════════════════════════════════════════════════════════

[paths]

# Directory containing your Google Takeout archive files.
# The tool scans this folder for .zip, .tar.*, and .7z files.
input_dir = "."

# Where extracted documents will be written (created if missing).
output_dir = "paperless_ready"


# ═══════════════════════════════════════════════════════════════════
# [include] — which file types to keep
# ═══════════════════════════════════════════════════════════════════

[include]

# Only files with these extensions are extracted.
# Everything else is silently skipped.
extensions = [
    ".pdf",
    ".docx",
    ".doc",
    ".xlsx",
    ".xls",
    ".csv",
    ".txt",
]


# ═══════════════════════════════════════════════════════════════════
# [exclude] — regex patterns that ban files
# ═══════════════════════════════════════════════════════════════════

[exclude]

# Every entry is compiled as a regex and checked against BOTH the
# filename and the full archive path.
#
# • Add (?i) at the start of a pattern for case-insensitive matching.
# • Directory patterns should use (?:^|/)name(?:/|$) so they match
#   only as path components, not substrings inside filenames.
# • Filename patterns should use ^ anchors to avoid matching inside
#   a full path.
#
# If you omit this key entirely, built-in defaults kick in:
#   patterns = ["(?i)(?:^|/)google photos(?:/|$)", "(?i)(?:^|/)trash(?:/|$)"]
patterns = [
    # "(?i)(?:^|/)google photos(?:/|$)",
    # "(?i)(?:^|/)trash(?:/|$)",
]


# ═══════════════════════════════════════════════════════════════════
# [output] — how extracted files are written
# ═══════════════════════════════════════════════════════════════════

[output]

# When true, no files are written.  Useful for testing your rules.
dry_run = false

# When true, the original directory path is encoded into the filename
# so you can tell where each file came from.
#
#   e.g. Takeout/Drive/Documents/report.pdf
#        → Takeout_Drive_Documents_report.pdf
#
# instead of just ``report.pdf``.
fingerprint = false

# Character(s) used to join path components when fingerprinting.
# Any string is allowed — multi-character tokens work fine.
fingerprint_delimiter = "_"

# When true (default), all files land directly in output_dir with
# unique flat names.  When false, the original archive directory
# structure is preserved under output_dir.
flatten = true

# What to do when the output path already exists.
#   rename    — append _1, _2, …  (default)
#   skip      — do not extract the file
#   overwrite — replace the existing file
collision = "rename"


# ═══════════════════════════════════════════════════════════════════
# [runtime] — execution behaviour
# ═══════════════════════════════════════════════════════════════════

[runtime]

# Logging verbosity.  DEBUG shows every file decision; INFO shows
# archives and summary; WARN/ERROR are quieter.
log_level = "INFO"   # DEBUG | INFO | WARN | ERROR
