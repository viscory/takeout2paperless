# takeout2paperless configuration
# See config/example.toml for a fully annotated version.

[takeout2paperless]
input_dir = "/home/fai/Downloads/takeout/"
output_dir = "paperless_ready"
dry_run = false
fingerprint = true

[filter]
include_extensions = [
    ".pdf", ".docx", ".doc", ".xlsx", ".xls", ".csv", ".txt",
]

[paperless]
# Optional: command to run after extraction when the user confirms consumption.
# {output_dir} is substituted automatically.
# consume_cmd = "docker compose -f ~/homelab/paperless-ngx/docker-compose.yml exec webserver python manage.py document_consumer {output_dir}"

[exclude]
# Unified ban list. Every entry is compiled as a case-insensitive regex
# and checked against both the filename and the full archive path.
ban = [
    # Directories (these will match inside the full archive path)
    "google photos",
    "trash",
    "cache",
    "config",
    "local",
    "code",
    "cloud_credentials",
    "tuttee",
    "tor-browser",
    "downloads",
    # Exam papers — Cambridge / CIE-style + duplicates with (N) suffix
    "^\\d{4}_[a-z]{1,3}\\d{0,2}_(?:qp|ms|er|gt|ir|sy|sr|ci|sm|in|tn|sp|nt|sf|fq|sw|ab)(?:_\\d{1,3})?(?:\\s*\\(\\d+\\))?\\.pdf$",
    # Google Takeout telemetry CSV exports
    "^open-telemetry.*\\.csv$",
]
