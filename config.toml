# takeout2paperless configuration
# See config/example.toml for a fully annotated version.

[takeout2paperless]
input_dir = "/home/fai/Downloads/takeout/"
output_dir = "paperless_ready"
dry_run = false
fingerprint = true

[filter]
# Extensions to extract
include_extensions = [".pdf", ".docx", ".doc", ".xlsx", ".xls", ".csv", ".txt"]

[exclude]
# Directory names to skip (case-insensitive substring match)
directories = [
    "google photos",
    "trash",
    "cache",
    "config",
    "local",
    "code",
    "cloud_credentials",
    "tuttee",
    "tor-browser",
    "downloads",
]

# Regex patterns matched against the full archive path
directory_patterns = [
    { name = "dot-local-config", pattern = "(?:^|/)\\.(?:local|config)(?:/|$)" },
    { name = "telemetry",        pattern = "open-telemetry" },
]

# Regex patterns matched against the filename only
filename_patterns = [
    { name = "exam-papers",  pattern = "^\\d{4}_[a-z]{1,3}\\d{0,2}_(?:qp|ms|er|gt|ir|sy|sr|ci|sm|in|tn|sp|nt|sf|fq|sw|ab)(?:_\\d{1,3})?(?:\\s*\\(\\d+\\))?\\.pdf$" },
    { name = "telemetry-csv", pattern = "^open-telemetry.*\\.csv$" },
]
