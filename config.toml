# takeout2paperless configuration
# See config/example.toml for a fully annotated version.

input_dir = "/home/fai/Downloads/takeout/"
output_dir = "paperless_ready"

target_extensions = [
    ".pdf", ".docx", ".doc", ".xlsx", ".xls", ".csv", ".txt",
]

dry_run = false
fingerprint = true

[exclude.directories]
"google photos" = true
"trash" = true
"cache" = true
"config" = true
"local" = true
"code" = true
"cloud_credentials" = true

[exclude.filename_patterns]
# Add your own regex patterns here, for example:
"exam-papers" = "^\\d{4}_[a-z]\\d{2}_(?:qp|ms|er|gt|ir|sy|sr|ci|sm|in|tn|sp|nt|sf)(?:_\\d{1,3})?\\.pdf$"
